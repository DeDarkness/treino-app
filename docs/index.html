<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Treino</title>

<style>
body{
    font-family:-apple-system;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}
h1{text-align:center;margin-bottom:20px}
select,input{
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    border:none;
}
button{
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:8px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
    width:100%;
}
.card{
    background:#1e293b;
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}
.timer{
    font-size:40px;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>Treinos da Semana</h1>

<select id="dia">
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
<option>Sábado</option>
<option>Domingo</option>
</select>

<input id="nome" placeholder="Nome do exercício">
<input id="series" placeholder="Séries">
<input id="reps" placeholder="Repetições">
<button onclick="add()">Adicionar Exercício</button>

<div id="lista"></div>

<h2>Timer</h2>
<input id="tempo" placeholder="Tempo em segundos">
<button onclick="start()">Iniciar Timer</button>
<button onclick="reset()">Zerar Timer</button>

<div class="timer" id="display">00:00</div>

<script>
let treinos = JSON.parse(localStorage.getItem("treinos") || "{}");

function salvar(){
    localStorage.setItem("treinos", JSON.stringify(treinos));
}

function render(){
    let lista = document.getElementById("lista");
    let dia = document.getElementById("dia").value;
    lista.innerHTML = "";

    if(!treinos[dia]) return;

    treinos[dia].forEach((t,i)=>{
        lista.innerHTML += `
        <div class="card">
            <b>${t.nome}</b><br>
            ${t.series} séries x ${t.reps} reps<br>
            <button onclick="remover('${dia}',${i})">Excluir</button>
        </div>`;
    });
}

function add(){
    let dia = document.getElementById("dia").value;
    let nome = document.getElementById("nome").value;
    let series = document.getElementById("series").value;
    let reps = document.getElementById("reps").value;

    if(!nome) return;

    if(!treinos[dia]) treinos[dia] = [];

    treinos[dia].push({nome,series,reps});
    salvar();
    render();

    document.getElementById("nome").value="";
    document.getElementById("series").value="";
    document.getElementById("reps").value="";
}

function remover(dia,i){
    treinos[dia].splice(i,1);
    salvar();
    render();
}

document.getElementById("dia").addEventListener("change", render);
render();

// TIMER
let intervalo;
let restante=0;

function start(){
    restante = parseInt(document.getElementById("tempo").value);
    if(!restante) return;

    clearInterval(intervalo);

    intervalo = setInterval(()=>{
        if(restante <= 0){
            clearInterval(intervalo);
            alert("Tempo finalizado!");
        }

        document.getElementById("display").innerText =
            Math.floor(restante/60).toString().padStart(2,'0') + ":" +
            (restante%60).toString().padStart(2,'0');

        restante--;
    },1000);
}

function reset(){
    clearInterval(intervalo);
    document.getElementById("display").innerText="00:00";
}
</script>

</body>
</html>
